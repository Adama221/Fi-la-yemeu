server {
    listen 80;
    server_name vps_ip_or_domain.com; # REMPLACER PAR VOTRE DOMAINE OU IP VPS

    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Static files pour Django admin
    location /static/ {
        alias /var/www/samabutik/django_project/staticfiles/;
    }

    # Media files (Images uploadées)
    location /media/ {
        alias /var/www/samabutik/django_project/media/;
    }

    # API Django
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/samabutik/django_project/samabutik.sock;
    }
    
    # Frontend Vite (React)
    location / {
        root /var/www/samabutik/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
